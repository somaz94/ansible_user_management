name: Create release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: "Release"
    runs-on: ubuntu-latest
    steps:
      - name: "Check-out"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get previous semver tag
        id: prev_tag
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          PREVIOUS_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | grep -B1 "^${CURRENT_TAG}$" | head -n1)
          if [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            PREVIOUS_TAG=""
          fi
          echo "tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog with git-cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append full changelog link
        if: steps.prev_tag.outputs.tag != ''
        run: |
          echo "" >> RELEASE.md
          REPO="${{ github.repository }}"
          PREV="${{ steps.prev_tag.outputs.tag }}"
          CURR="${{ github.ref_name }}"
          URL="https://github.com/${REPO}/compare/${PREV}...${CURR}"
          echo "**Full Changelog**: ${URL}" >> RELEASE.md

      - name: "Create GitHub release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
