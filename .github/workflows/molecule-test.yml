name: Molecule Test

on:
  push:
    branches:
      - main
    paths:
      - "tasks/**"
      - "handlers/**"
      - "defaults/**"
      - "vars/**"
      - "meta/**"
      - "molecule/**"
      - "templates/**"
      - "files/**"
      - ".github/workflows/molecule-test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "tasks/**"
      - "handlers/**"
      - "defaults/**"
      - "vars/**"
      - "meta/**"
      - "molecule/**"
      - "templates/**"
      - "files/**"
      - ".github/workflows/molecule-test.yml"
  workflow_dispatch:

jobs:
  molecule:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu2204
          - ubuntu2404
          - debian11
          - debian12
          - rockylinux9
    steps:
      - uses: actions/checkout@v6

      - uses: somaz94/ansible-molecule-test-action@v1
        with:
          distro: ${{ matrix.distro }}
