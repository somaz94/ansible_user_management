---
- name: Verify
  hosts: all
  tasks:
    - name: Check if testuser1 exists
      command: id testuser1
      register: testuser1_result
      changed_when: false

    - name: Verify testuser1 shell is modified
      command: getent passwd testuser1
      register: testuser1_passwd
      changed_when: false

    - name: Assert testuser1 shell is /bin/sh
      assert:
        that:
          - "'/bin/sh' in testuser1_passwd.stdout"

    - name: Check if testuser2 exists
      command: id testuser2
      register: testuser2_result
      changed_when: false

    - name: Check if testuser3 is removed
      command: id testuser3
      register: testuser3_result
      failed_when: testuser3_result.rc == 0
      changed_when: false
