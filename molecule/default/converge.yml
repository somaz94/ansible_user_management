---
- name: Converge
  hosts: all
  become: true

  pre_tasks:
    - name: Create testuser3 for removal test
      user:
        name: testuser3
        state: present

  roles:
    - role: ansible_user_management
      vars:
        users_to_create:
          - name: testuser1
            password: "{{ 'password123' | password_hash('sha512') }}"
            shell: "/bin/bash"
          - name: testuser2
            password: "{{ 'password456' | password_hash('sha512') }}"
            shell: "/bin/bash"
        users_to_modify:
          - name: testuser1
            shell: "/bin/sh"
        users_to_remove:
          - testuser3
