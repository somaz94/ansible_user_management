---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    # NOTE: This permits-all PAM rewrite is scoped to ephemeral molecule
    # containers (geerlingguy/docker-*-ansible) used only by `make test`.
    # The RHEL/Rocky9 minimal image lacks sssd, so a narrow password-stack
    # patch is not enough — sudo's `account` lookup also fails. Containers
    # are destroyed after each test run.
    - name: Loosen PAM stack for container testing (RedHat family)
      ansible.builtin.raw: |
        if [ -f /etc/pam.d/system-auth ] && [ ! -f /etc/pam.d/system-auth.bak ]; then
          cp /etc/pam.d/system-auth /etc/pam.d/system-auth.bak
          cat > /etc/pam.d/system-auth <<'PAM'
        auth sufficient pam_permit.so
        account sufficient pam_permit.so
        password sufficient pam_permit.so
        session sufficient pam_permit.so
        PAM
          echo "patched"
        fi
      register: pam_patch
      changed_when: "'patched' in (pam_patch.stdout | default(''))"

    - name: Gather facts after PAM patch
      ansible.builtin.setup:

    - name: Create testuser3 for removal test
      ansible.builtin.user:
        name: testuser3
        state: present

    - name: Create testuser4 for modification test
      ansible.builtin.user:
        name: testuser4
        shell: "/bin/bash"
        state: present
