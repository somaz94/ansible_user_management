---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Fix PAM configuration for Docker containers (RedHat family)
      raw: |
        if [ -f /etc/pam.d/system-auth ]; then
          cp /etc/pam.d/system-auth /etc/pam.d/system-auth.bak
          echo -e "auth sufficient pam_permit.so\naccount sufficient pam_permit.so\npassword sufficient pam_permit.so\nsession sufficient pam_permit.so" > /etc/pam.d/system-auth
        fi
      changed_when: false

    - name: Gather facts after PAM fix
      setup:

    - name: Create testuser3 for removal test
      user:
        name: testuser3
        state: present

    - name: Create testuser4 for modification test
      user:
        name: testuser4
        shell: "/bin/bash"
        state: present
