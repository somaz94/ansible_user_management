---
- name: Prepare
  hosts: all
  become: true
  gather_facts: true
  tasks:
    - name: Loosen password-quality checks for container testing (RedHat family)
      ansible.builtin.shell: |
        set -euo pipefail
        if [ -f /etc/pam.d/system-auth ] && [ ! -f /etc/pam.d/system-auth.bak ]; then
          cp /etc/pam.d/system-auth /etc/pam.d/system-auth.bak
          sed -i 's/^password.*pam_pwquality\.so.*$/password    sufficient    pam_permit.so/' /etc/pam.d/system-auth
          sed -i 's/^password.*pam_unix\.so.*$/password    sufficient    pam_unix.so sha512 nullok/' /etc/pam.d/system-auth
          echo "patched"
        fi
      args:
        creates: /etc/pam.d/system-auth.bak
      register: pam_patch
      changed_when: pam_patch.stdout is search('patched')
      when: ansible_os_family == 'RedHat'

    - name: Create testuser3 for removal test
      ansible.builtin.user:
        name: testuser3
        state: present

    - name: Create testuser4 for modification test
      ansible.builtin.user:
        name: testuser4
        shell: "/bin/bash"
        state: present
