---
# Role-internal: system usernames that must never be removed by this role.
# Defined here (not in defaults/) so consumers cannot accidentally override
# the guard list and request removal of a critical system user.
protected_users:
  - root
  - daemon
  - bin
  - sys
  - sync
  - games
  - man
  - lp
  - mail
  - news
  - uucp
  - proxy
  - www-data
  - backup
  - list
  - irc
  - gnats
  - nobody
  - systemd-network
  - systemd-resolve
  - messagebus
  - sshd
  - operator
  - shutdown
  - halt
  - adm
  - polkitd
  - dbus
