---
- name: Validate users_to_create input
  ansible.builtin.assert:
    that:
      - item.name is match('^[a-z_][a-z0-9_-]*[$]?$')
      - item.name | length <= 32
      - item.shell | default('/bin/bash') is match('^/[a-zA-Z0-9/_.-]+$')
    fail_msg: "Invalid user input: name='{{ item.name }}'"
    quiet: true
  loop: "{{ users_to_create }}"

- name: Validate users_to_modify input
  ansible.builtin.assert:
    that:
      - item.name is match('^[a-z_][a-z0-9_-]*[$]?$')
      - item.name | length <= 32
      - item.shell | default('/bin/bash') is match('^/[a-zA-Z0-9/_.-]+$')
    fail_msg: "Invalid user input: name='{{ item.name }}'"
    quiet: true
  loop: "{{ users_to_modify }}"

- name: Validate users_to_remove input
  ansible.builtin.assert:
    that:
      - item is string
      - item is match('^[a-z_][a-z0-9_-]*[$]?$')
      - item | length <= 32
      - item not in protected_users
    fail_msg: "Invalid or protected username: '{{ item }}'"
    quiet: true
  loop: "{{ users_to_remove }}"

- name: Create users
  ansible.builtin.user:
    name: "{{ item.name }}"
    password: "{{ item.password | default(omit) }}"
    shell: "{{ item.shell | default('/bin/bash') }}"
    state: present
  loop: "{{ users_to_create }}"
  no_log: true

- name: Modify users
  ansible.builtin.user:
    name: "{{ item.name }}"
    password: "{{ item.password | default(omit) }}"
    shell: "{{ item.shell | default(omit) }}"
    state: present
  loop: "{{ users_to_modify }}"
  no_log: true

- name: Remove users
  ansible.builtin.user:
    name: "{{ item }}"
    state: absent
    remove: true
  loop: "{{ users_to_remove }}"
  no_log: true
